<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#0a0820"/>
  <!-- fireworks bursts -->
  <circle cx="400" cy="200" r="80" fill="none" stroke="#ff6080" stroke-width="3" opacity="0.8"/>
  <circle cx="400" cy="200" r="50" fill="none" stroke="#ffb060" stroke-width="2" opacity="0.6"/>
  <line x1="400" y1="120" x2="400" y2="100" stroke="#ff6080" stroke-width="2"/><line x1="350" y1="150" x2="330" y2="135" stroke="#ff6080" stroke-width="2"/>
  <line x1="450" y1="150" x2="470" y2="135" stroke="#ff6080" stroke-width="2"/><line x1="340" y1="200" x2="320" y2="200" stroke="#ffb060" stroke-width="2"/>
  <circle cx="800" cy="160" r="100" fill="none" stroke="#60a0ff" stroke-width="3" opacity="0.7"/>
  <circle cx="800" cy="160" r="60" fill="none" stroke="#80ffb0" stroke-width="2" opacity="0.5"/>
