<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#fff8e8"/>
  <!-- corridor perspective lines -->
  <line x1="0" y1="0" x2="640" y2="360" stroke="#e8d8c0" stroke-width="2"/>
  <line x1="1280" y1="0" x2="640" y2="360" stroke="#e8d8c0" stroke-width="2"/>
  <line x1="0" y1="720" x2="640" y2="360" stroke="#e8d8c0" stroke-width="2"/>
  <line x1="1280" y1="720" x2="640" y2="360" stroke="#e8d8c0" stroke-width="2"/>
  <!-- warm sunlight rectangles -->
  <rect x="200" y="200" width="120" height="300" fill="#ffe8a0" opacity="0.3"/>
  <rect x="500" y="200" width="120" height="300" fill="#ffe8a0" opacity="0.2"/>
  <!-- girl bowing silhouette -->
  <ellipse cx="640" cy="340" rx="45" ry="40" fill="#5a6080"/>
  <rect x="615" y="370" width="50" height="80" rx="6" fill="#5a6080" transform="rotate(-15, 640, 370)"/>
  <text x="640" y="660" text-anchor="middle" font-size="36" fill="#6a5a4a" font-family="Arial, sans-serif">走廊里的鞠躬</text>
  <text x="640" y="690" text-anchor="middle" font-size="16" fill="#8a7a6a" font-family="Arial, sans-serif">CG 占位图 — cg_lin_corridor</text>
</svg>
